name: Run scheduled posts

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  run-scheduled-posts:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger scheduled post worker
        run: |
          curl --fail --show-error --silent \
            --request POST \
            --header "Content-Type: application/json" \
            --header "x-scheduler-secret: ${{ secrets.SCHEDULED_WORKER_SECRET }}" \
            --data '{"batchSize":10}' \
            "https://qfqowhetrxritoyjzzcz.supabase.co/functions/v1/run-scheduled-posts"
